  <ellipse cx="537" cy="183" rx="8" ry="3" fill="#FFF8E1" opacity="0.7"/>
  <line x1="533" y1="190" x2="541" y2="190" stroke="#8D6E63" stroke-width="0.3" opacity="0.4"/>
  <line x1="533" y1="193" x2="541" y2="193" stroke="#8D6E63" stroke-width="0.3" opacity="0.4"/>
  <line x1="533" y1="196" x2="541" y2="196" stroke="#8D6E63" stroke-width="0.3" opacity="0.4"/>

  <!-- FLOATING MAGIC PARTICLES -->
  <circle cx="300" cy="100" r="2" fill="#FFD700" filter="url(#blur1)" opacity="0">
    <animate attributeName="cy" values="150;80;150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="300;310;300" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="120" r="1.5" fill="#CE93D8" filter="url(#blur1)" opacity="0">
    <animate attributeName="cy" values="160;90;160" dur="6s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cx" values="480;470;480" dur="6s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="6s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="350" cy="80" r="1.8" fill="#FFD700" filter="url(#blur1)" opacity="0">
