  <!-- Books row 4 -->
  <rect x="684" y="199" width="9" height="49" fill="#E65100" rx="1"/>
  <rect x="694" y="202" width="7" height="46" fill="#1A237E" rx="1"/>
  <rect x="702" y="199" width="10" height="49" fill="#880E4F" rx="1"/>
  <rect x="713" y="201" width="8" height="47" fill="#004D40" rx="1"/>
