  <rect x="740" y="202" width="10" height="46" fill="#1565C0" rx="1" transform="rotate(-2,745,225)"/>

  <!-- DESK -->
  <path d="M150,210 L650,210 L670,270 L130,270 Z" fill="url(#desk)"/>
  <!-- Desk front -->
  <path d="M130,270 L670,270 L670,285 L130,285 Z" fill="#3E2723"/>
  <!-- Desk legs -->
  <rect x="155" y="285" width="8" height="15" fill="#2C1B18"/>
  <rect x="637" y="285" width="8" height="15" fill="#2C1B18"/>

  <!-- BOOK STACKS ON DESK -->
  <!-- Left stack (tall, messy) -->
  <rect x="170" y="170" width="45" height="8" fill="#C62828" rx="1" transform="rotate(-2,192,174)"/>
  <rect x="168" y="162" width="48" height="8" fill="#1565C0" rx="1" transform="rotate(1,192,166)"/>
  <rect x="171" y="154" width="43" height="8" fill="#2E7D32" rx="1" transform="rotate(-1,192,158)"/>
  <rect x="169" y="146" width="46" height="8" fill="#6A1B9A" rx="1" transform="rotate(2,192,150)"/>
  <rect x="170" y="138" width="44" height="8" fill="#E65100" rx="1" transform="rotate(-1,192,142)"/>
  <rect x="172" y="178" width="42" height="8" fill="#004D40" rx="1"/>
  <rect x="169" y="186" width="47" height="8" fill="#880E4F" rx="1" transform="rotate(1,192,190)"/>
  <rect x="170" y="194" width="45" height="8" fill="#1A237E" rx="1"/>
  <rect x="168" y="202" width="48" height="8" fill="#33691E" rx="1" transform="rotate(-1,192,206)"/>

  <!-- Right stack (shorter) -->
  <rect x="560" y="185" width="50" height="8" fill="#AD1457" rx="1" transform="rotate(2,585,189)"/>
  <rect x="558" y="177" width="52" height="8" fill="#0D47A1" rx="1" transform="rotate(-1,584,181)"/>
  <rect x="561" y="169" width="48" height="8" fill="#BF360C" rx="1"/>
  <rect x="559" y="193" width="50" height="8" fill="#4527A0" rx="1" transform="rotate(1,584,197)"/>
  <rect x="560" y="201" width="48" height="8" fill="#00695C" rx="1" transform="rotate(-2,584,205)"/>

  <!-- Small stack near figure -->
  <rect x="340" y="195" width="35" height="7" fill="#311B92" rx="1" transform="rotate(3,357,198)"/>
  <rect x="338" y="188" width="38" height="7" fill="#B71C1C" rx="1" transform="rotate(-1,357,191)"/>
  <rect x="341" y="181" width="34" height="7" fill="#1B5E20" rx="1"/>

  <!-- OPEN BOOK on desk (the one being read) -->
  <!-- Left page -->
  <path d="M380,205 Q400,195 420,200 L420,170 Q400,165 380,175 Z" fill="#FFF8E1" opacity="0.9"/>
  <!-- Right page -->
  <path d="M420,200 Q440,195 460,205 L460,175 Q440,165 420,170 Z" fill="#FFFDE7" opacity="0.9"/>
  <!-- Spine -->
  <line x1="420" y1="170" x2="420" y2="200" stroke="#5D4037" stroke-width="1.5"/>
  <!-- Text lines (left page) -->
  <line x1="387" y1="180" x2="415" y2="177" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>
  <line x1="387" y1="184" x2="415" y2="181" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>
  <line x1="387" y1="188" x2="415" y2="185" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>
  <line x1="387" y1="192" x2="415" y2="189" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>
  <line x1="387" y1="196" x2="410" y2="194" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>
  <!-- Text lines (right page) -->
  <line x1="425" y1="177" x2="453" y2="180" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>
  <line x1="425" y1="181" x2="453" y2="184" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>
  <line x1="425" y1="185" x2="453" y2="188" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>
  <line x1="425" y1="189" x2="453" y2="192" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>
  <line x1="425" y1="193" x2="448" y2="195" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>

  <!-- FIGURE (robed scholar hunched over book) -->
  <!-- Robe body -->
  <path d="M390,130 Q380,160 375,210 L465,210 Q460,160 450,130 Q420,120 390,130 Z" fill="#1A0033" opacity="0.9"/>
  <!-- Robe folds highlight -->
  <path d="M400,140 Q395,170 393,210" stroke="#2D1B4E" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M440,140 Q445,170 447,210" stroke="#2D1B4E" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Hood -->
  <path d="M395,130 Q390,110 400,100 Q420,90 440,100 Q450,110 445,130 Q430,125 420,125 Q410,125 395,130 Z" fill="#1A0033"/>
  <!-- Hood shadow/depth -->
  <path d="M400,125 Q410,115 420,113 Q430,115 440,125" stroke="#0D001A" stroke-width="1" fill="#0D001A" opacity="0.5"/>
  <!-- Face shadow (mostly hidden in hood) -->
  <ellipse cx="420" cy="118" rx="12" ry="8" fill="#1A0033" opacity="0.8"/>
  <!-- Hint of face -->
  <ellipse cx="420" cy="120" rx="8" ry="5" fill="#D7CCC8" opacity="0.3"/>
  <!-- Arms reaching to book -->
  <!-- Left arm -->
  <path d="M390,145 Q380,170 395,195" stroke="#1A0033" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M450,145 Q460,170 445,195" stroke="#1A0033" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Hands on book -->
  <ellipse cx="400" cy="197" rx="6" ry="4" fill="#D7CCC8" opacity="0.5"/>
  <ellipse cx="440" cy="197" rx="6" ry="4" fill="#D7CCC8" opacity="0.5"/>

  <!-- CANDLE (on desk, right of figure) -->
  <rect x="498" y="178" width="6" height="25" fill="#FFF8E1" rx="1"/>
  <!-- Wick -->
  <line x1="501" y1="178" x2="501" y2="174" stroke="#3E2723" stroke-width="1"/>
  <!-- Flame -->
  <ellipse cx="501" cy="170" rx="4" ry="8" fill="#FF8F00" opacity="0.9">
    <animate attributeName="ry" values="8;9;7;8.5;8" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="4;3.5;4.5;3.8;4" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="501" cy="168" rx="2" ry="5" fill="#FFD600" opacity="0.8">
    <animate attributeName="ry" values="5;6;4.5;5.5;5" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="501" cy="167" rx="1" ry="3" fill="#FFFFFF" opacity="0.6">
    <animate attributeName="ry" values="3;3.5;2.5;3.2;3" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Candle glow -->
  <ellipse cx="501" cy="180" rx="80" ry="60" fill="url(#candleGlow)"/>

  <!-- SECOND CANDLE (far left on desk) -->
  <rect x="238" y="185" width="5" height="20" fill="#FFF8E1" rx="1"/>
  <line x1="240.5" y1="185" x2="240.5" y2="181" stroke="#3E2723" stroke-width="1"/>
  <ellipse cx="240.5" cy="177" rx="3.5" ry="7" fill="#FF8F00" opacity="0.9">
    <animate attributeName="ry" values="7;8;6.5;7.5;7" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="3.5;3;4;3.3;3.5" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="240.5" cy="175.5" rx="1.8" ry="4" fill="#FFD600" opacity="0.8">
