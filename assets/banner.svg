    <animate attributeName="cx" values="350;340;350" dur="7s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="7s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="550" cy="90" r="1.2" fill="#B39DDB" filter="url(#blur1)" opacity="0">
    <animate attributeName="cy" values="130;70;130" dur="9s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cx" values="550;560;550" dur="9s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="9s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="260" cy="110" r="1" fill="#FFD700" filter="url(#blur1)" opacity="0">
    <animate attributeName="cy" values="160;100;160" dur="5s" repeatCount="indefinite" begin="3s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite" begin="3s"/>
  </circle>
  <circle cx="450" cy="70" r="1.5" fill="#CE93D8" filter="url(#blur1)" opacity="0">
    <animate attributeName="cy" values="120;50;120" dur="10s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="cx" values="450;445;450" dur="10s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="10s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="380" cy="60" r="1.3" fill="#FFD700" filter="url(#blur1)" opacity="0">
    <animate attributeName="cy" values="110;40;110" dur="7.5s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="cx" values="380;390;380" dur="7.5s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="opacity" values="0;0.55;0" dur="7.5s" repeatCount="indefinite" begin="4s"/>
  </circle>

  <!-- DUST MOTES (tiny, slow) -->
  <circle cx="200" cy="150" r="0.5" fill="#FFECB3" opacity="0">
    <animate attributeName="cy" values="180;140;180" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="200;215;200" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="130" r="0.5" fill="#FFECB3" opacity="0">
    <animate attributeName="cy" values="160;120;160" dur="15s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="cx" values="600;590;600" dur="15s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.3;0" dur="15s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="320" cy="90" r="0.4" fill="#FFECB3" opacity="0">
    <animate attributeName="cy" values="120;80;120" dur="11s" repeatCount="indefinite" begin="5s"/>
