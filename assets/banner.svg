  <rect x="10" y="30" width="55" height="4" fill="#5D4037"/>
  <rect x="10" y="85" width="55" height="4" fill="#5D4037"/>
  <rect x="10" y="140" width="55" height="4" fill="#5D4037"/>
  <rect x="10" y="195" width="55" height="4" fill="#5D4037"/>
  <!-- Books row 1 -->
  <rect x="14" y="34" width="8" height="50" fill="#C62828" rx="1"/>
  <rect x="23" y="38" width="6" height="46" fill="#1565C0" rx="1"/>
  <rect x="30" y="34" width="9" height="50" fill="#2E7D32" rx="1"/>
  <rect x="40" y="36" width="7" height="48" fill="#6A1B9A" rx="1"/>
  <rect x="48" y="34" width="10" height="50" fill="#E65100" rx="1"/>
  <!-- Books row 2 -->
  <rect x="14" y="90" width="10" height="49" fill="#AD1457" rx="1"/>
  <rect x="25" y="93" width="7" height="46" fill="#00695C" rx="1"/>
  <rect x="33" y="89" width="8" height="50" fill="#4527A0" rx="1"/>
  <rect x="42" y="91" width="9" height="48" fill="#BF360C" rx="1"/>
  <rect x="52" y="90" width="7" height="49" fill="#1B5E20" rx="1"/>
  <!-- Books row 3 -->
  <rect x="14" y="144" width="7" height="50" fill="#0D47A1" rx="1"/>
  <rect x="22" y="147" width="9" height="47" fill="#880E4F" rx="1"/>
  <rect x="32" y="144" width="8" height="50" fill="#33691E" rx="1"/>
  <rect x="41" y="146" width="10" height="48" fill="#311B92" rx="1"/>
  <rect x="52" y="144" width="7" height="50" fill="#B71C1C" rx="1"/>
  <!-- Books row 4 (some leaning) -->
  <rect x="14" y="199" width="9" height="48" fill="#004D40" rx="1" transform="rotate(-3,18,223)"/>
  <rect x="24" y="199" width="7" height="50" fill="#E65100" rx="1"/>
  <rect x="32" y="202" width="8" height="47" fill="#1A237E" rx="1"/>
  <rect x="41" y="199" width="10" height="50" fill="#4A148C" rx="1"/>

  <!-- RIGHT BOOKSHELF -->
  <rect x="680" y="30" width="110" height="240" fill="url(#wood)" rx="2"/>
  <!-- Shelves -->
  <rect x="680" y="30" width="110" height="4" fill="#5D4037"/>
  <rect x="680" y="85" width="110" height="4" fill="#5D4037"/>
  <rect x="680" y="140" width="110" height="4" fill="#5D4037"/>
  <rect x="680" y="195" width="110" height="4" fill="#5D4037"/>
  <!-- Books row 1 -->
  <rect x="684" y="34" width="9" height="50" fill="#1565C0" rx="1"/>
  <rect x="694" y="37" width="7" height="47" fill="#C62828" rx="1"/>
  <rect x="702" y="34" width="10" height="50" fill="#6A1B9A" rx="1"/>
  <rect x="713" y="36" width="8" height="48" fill="#2E7D32" rx="1"/>
  <rect x="722" y="34" width="9" height="50" fill="#E65100" rx="1"/>
  <rect x="732" y="38" width="7" height="46" fill="#00695C" rx="1"/>
  <rect x="740" y="34" width="10" height="50" fill="#AD1457" rx="1"/>
  <rect x="751" y="35" width="8" height="49" fill="#0D47A1" rx="1"/>
  <rect x="760" y="34" width="9" height="50" fill="#BF360C" rx="1"/>
  <rect x="770" y="37" width="10" height="47" fill="#4527A0" rx="1"/>
  <!-- Books row 2 -->
  <rect x="684" y="89" width="10" height="50" fill="#33691E" rx="1"/>
  <rect x="695" y="92" width="8" height="47" fill="#880E4F" rx="1"/>
  <rect x="704" y="89" width="7" height="50" fill="#311B92" rx="1"/>
  <rect x="712" y="91" width="11" height="48" fill="#B71C1C" rx="1"/>
  <rect x="724" y="89" width="8" height="50" fill="#004D40" rx="1"/>
  <rect x="733" y="92" width="9" height="47" fill="#1565C0" rx="1"/>
  <rect x="743" y="89" width="7" height="50" fill="#E65100" rx="1"/>
  <rect x="751" y="90" width="10" height="49" fill="#6A1B9A" rx="1"/>
  <rect x="762" y="89" width="9" height="50" fill="#2E7D32" rx="1"/>
  <!-- Books row 3 -->
  <rect x="684" y="144" width="8" height="50" fill="#4A148C" rx="1"/>
  <rect x="693" y="147" width="10" height="47" fill="#BF360C" rx="1"/>
  <rect x="704" y="144" width="7" height="50" fill="#1B5E20" rx="1"/>
  <rect x="712" y="146" width="9" height="48" fill="#0D47A1" rx="1"/>
  <rect x="722" y="144" width="8" height="50" fill="#C62828" rx="1"/>
  <rect x="731" y="147" width="10" height="47" fill="#00695C" rx="1"/>
