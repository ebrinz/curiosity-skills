<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- Candle glow gradient -->
    <radialGradient id="candleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.4">
        <animate attributeName="stop-opacity" values="0.4;0.6;0.35;0.55;0.4" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="40%" stop-color="#FF8C00" stop-opacity="0.15">
        <animate attributeName="stop-opacity" values="0.15;0.25;0.1;0.2;0.15" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>

    <!-- Secondary candle glow -->
    <radialGradient id="candleGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3">
        <animate attributeName="stop-opacity" values="0.3;0.5;0.25;0.45;0.3" dur="2.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FF8C00" stop-opacity="0.1">
        <animate attributeName="stop-opacity" values="0.1;0.2;0.08;0.15;0.1" dur="2.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>

    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0A1A"/>
      <stop offset="100%" stop-color="#1A1030"/>
    </linearGradient>

    <!-- Bookshelf wood -->
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E2723"/>
      <stop offset="100%" stop-color="#2C1B18"/>
    </linearGradient>

    <!-- Desk surface -->
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4E342E"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>

    <!-- Window moonlight -->
    <radialGradient id="moonlight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#C5CAE9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="0"/>
    </radialGradient>

    <!-- Particle glow -->
    <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>

    <!-- Star twinkle filter -->
    <filter id="blur1">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bgGrad)"/>

  <!-- Arched window (back wall, left side) -->
  <path d="M80,40 Q80,10 110,10 Q140,10 140,40 L140,120 L80,120 Z" fill="#1A237E" opacity="0.4"/>
  <path d="M85,42 Q85,15 110,15 Q135,15 135,42 L135,118 L85,118 Z" fill="#283593" opacity="0.3"/>
  <!-- Moonbeam -->
  <ellipse cx="140" cy="100" rx="120" ry="80" fill="url(#moonlight)"/>
  <!-- Window panes -->
  <line x1="110" y1="15" x2="110" y2="118" stroke="#2C1B18" stroke-width="2"/>
  <line x1="85" y1="65" x2="135" y2="65" stroke="#2C1B18" stroke-width="2"/>
  <!-- Stars through window -->
  <circle cx="95" cy="30" r="1" fill="#E8EAF6" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="25" r="0.8" fill="#E8EAF6" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="128" cy="45" r="0.6" fill="#E8EAF6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- LEFT BOOKSHELF -->
